      // Exercise 3j
      // Added an onKeyDown event prop to the input element in the ChatInput component. When the user presses the "Escape" key, the input text is cleared by setting the inputText state to an empty string.
      function ChatInput({ chatMessages, setChatMessages }) {
        const [inputText, setInputText] = React.useState('');
        function saveInputText(event) {
          setInputText(event.target.value);
        }

        function sendMessage() {
          const newChatMessages = [
            ...chatMessages,
            {
              message: inputText,
              sender: 'user',
              id: crypto.randomUUID()
            }
          ];

          setChatMessages(newChatMessages);

          const response = Chatbot.getResponse(inputText);
          setChatMessages([
            ...newChatMessages,
            {
              message: response,
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ]);

          setInputText('');
        }

        return (
          <>
            <input 
             placeholder= "Send a message to Chatbot"
             size= "30" 
             onChange={saveInputText}
             value={inputText}  //=> controlled input
             //  onKeyDown => new event prop 
             onKeyDown={(event) => {
               (event.key === 'Enter') && sendMessage();
               (event.key === 'Escape') && setInputText('');
              }
             }
            />
            <button
             onClick={sendMessage}
            >Send</button>
          </>
        );
      }

      function ChatMessage({ message, sender }) {
        // const message = props.message;

      function ChatMessages({ chatMessages }) {

        return (
          <>
            {chatMessages.map((chatMessage) => {
              return (
                <ChatMessage 
                  message={chatMessage.message}
                  sender={chatMessage.sender} 
                  key={chatMessage.id}
                />
              );
            })}
          </>
        );
      }

      function App() {
        const [chatMessages, setChatMessages] = React.useState([{

          sender: 'user',

        }, {

       //const [chatMessages, setChatMessages] = array;
       /*shortcut(we used array destructuring above instead of this two lines of code) =>const chatMessages = array[0];
       const setChatMessages = array[1];

        return (

            <ChatMessages 
             chatMessages={chatMessages}
