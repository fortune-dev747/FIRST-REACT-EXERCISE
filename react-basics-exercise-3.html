      // Exercise 3m
      function ChatInput({ chatMessages, setChatMessages }) {
        const [inputText, setInputText] = React.useState('');
        const [isLoading, setIsLoading] = React.useState(false);


        function saveInputText(event) {
          setInputText(event.target.value);
        }

        // added async / await features to handle the asynchronous response from the chatbot
        async function sendMessage() {
          if (isLoading || inputText === '') {
            return;
          }
          // Set isLoading to true at the start, and set it to
          // false after everything is done.
          setIsLoading(true);
          // We can put this at the top of the function or
          // after the first setChatMessages(). Both work.
          setInputText(''); // Clear the input field immediately after sending the message

          const newChatMessages = [
            ...chatMessages,
            {
              message: inputText,
              sender: 'user',
              id: crypto.randomUUID()
            }
          ];

          setChatMessages([
            ...newChatMessages,
            // This creates a temporary Loading... message.
            // Because we don't save this message in newChatMessages,
            // it will be remove later, when we add the response.
            {
              message: 'Loading...',
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ]);


          const response = await Chatbot.getResponseAsync(inputText);
          setChatMessages([
            ...newChatMessages,
            {
              message: response,
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ]);

          // Set isLoading to false after everything is done.
          setIsLoading(false);

        }

        function handleKeyDown(event) {
          if (event.key === 'Enter') {
            sendMessage();
          } else if (event.key === 'Escape') {
            setInputText('');
          }
        }

        return (
          <>
            <input 
             placeholder= "Send a message to Chatbot"
             size= "30" 
             onChange={saveInputText}
             value={inputText}  //=> controlled input
             //  onKeyDown => new events prop for both enter and escape key
             onKeyDown={handleKeyDown}
            />
            <button
             onClick={sendMessage}
            >Send</button>
          </>
        );
      }

        */


        return (
          <div>
            {sender === 'robot' && (
              <img src= "robot.png" width= "50"/>
            )}
            {message}
            {sender === 'user' && (
              <img src= "user.png" width= "50"/>
            )}
          </div>
        );
      }
      
      function ChatMessages({ chatMessages }) {

        return (
          <>
            {chatMessages.map((chatMessage) => {
              return (
                <ChatMessage 
                  message={chatMessage.message}
                  sender={chatMessage.sender} 
                  key={chatMessage.id}
                />
              );
            })}
          </>
        );
      }

      function App() {
        const [chatMessages, setChatMessages] = React.useState([{
          message: 'hello chatbot',
          sender: 'user',
          id: 'id1'
        }, {
          message: 'Hello! How can I help you?',
          sender: 'robot',
          id: 'id2'
        }, {
          message: 'what is the date',
          sender: 'user',
          id: 'id3'
        }, {
          message: 'Today is May 30',
          sender: 'robot',
          id: 'id4'
        }]);
       //const [chatMessages, setChatMessages] = array;
       /*shortcut(we used array destructuring above instead of this two lines of code) =>const chatMessages = array[0];
       const setChatMessages = array[1];
       */

        return (
          <>
            <ChatInput 
             chatMessages={chatMessages}
             setChatMessages={setChatMessages}
            />
            <ChatMessages 
             chatMessages={chatMessages}
            />
          </>
        );
      }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    
    </script>
  </body>
