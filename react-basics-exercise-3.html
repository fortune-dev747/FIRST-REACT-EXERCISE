      // Exercise 3c
       function App() {
        const [count, setCount] = React.useState(0);
        function clicked() {
          setCount(count + 1);
        }
        return (
          <>
            {count === 1 ? <button onClick={clicked}>Clicked {count} time</button> : <button onClick={clicked}>Clicked {count} times</button>}
          </>
        );
      
        

      }



      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    
    </script>
