      // Exercise 4b
      function App() {
        const [isButtonOn, setIsButtonOn] = React.useState(true);

        function switchButton() {
          if (isButtonOn) {
            setIsButtonOn(false);
          } else {
            setIsButtonOn(true);
          }
        }

        return (
          <>
            <button onClick={switchButton} className="on-button">ON</button>
            {isButtonOn ? 'ON' : 'OFF'}
          </>
        );
      }


      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    
    </script>
  </body>
