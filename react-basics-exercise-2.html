      // Exercise 2h
      function App() {
        return (
          <>
            <ProductDetails item="Tennis Balls" 
             price="6.00"
            />
            <ProductDetails item="Cotton Socks" 
             price="10.90" 
             discountPrice="5.45"
            />
            <ProductDetails item="Plain T-Shirt" 
             price="7.99"
            />
          </>
        );
      }
      function ProductDetails( {item, price, discountPrice} ) {
        return (
          <>
            <p>{item}</p>
            {!discountPrice && (
              <p>Price : ${price}</p>
            )}
            {discountPrice && (
              <p><del>Price: ${price}</del></p>
            )}
            {discountPrice && (
              <p>Discount Price: ${discountPrice}</p>
            )}
            <button>Add to Cart</button>
          </>
        );
      }
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
